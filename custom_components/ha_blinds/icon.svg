<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="blindGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Window frame -->
  <rect x="30" y="20" width="140" height="160" fill="none" stroke="#2C3E50" stroke-width="4" rx="8"/>

  <!-- Window background -->
  <rect x="35" y="25" width="130" height="150" fill="#E8F4F8" rx="5"/>

  <!-- Blind slats with gradient -->
  <g filter="url(#shadow)">
    <rect x="40" y="30" width="120" height="12" fill="url(#blindGradient)" rx="2"/>
    <rect x="40" y="48" width="120" height="12" fill="url(#blindGradient)" rx="2"/>
    <rect x="40" y="66" width="120" height="12" fill="url(#blindGradient)" rx="2"/>
    <rect x="40" y="84" width="120" height="12" fill="url(#blindGradient)" rx="2"/>
    <rect x="40" y="102" width="120" height="12" fill="url(#blindGradient)" rx="2"/>
    <rect x="40" y="120" width="120" height="12" fill="url(#blindGradient)" rx="2"/>
    <rect x="40" y="138" width="120" height="12" fill="url(#blindGradient)" rx="2"/>
  </g>

  <!-- Control mechanism (pull cord) -->
  <circle cx="160" cy="80" r="6" fill="#FF6B6B" opacity="0.8"/>
  <path d="M 160 86 Q 165 100 160 120" stroke="#FF6B6B" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Highlight/shine effect -->
  <ellipse cx="70" cy="50" rx="20" ry="8" fill="white" opacity="0.3"/>

  <!-- Sun indicator in corner (when automated) -->
  <circle cx="155" cy="35" r="8" fill="#FFD700" opacity="0.7"/>
  <circle cx="155" cy="35" r="6" fill="#FFC107" opacity="0.9"/>
</svg>
